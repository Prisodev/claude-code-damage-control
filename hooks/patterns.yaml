# Damage Control Patterns
# Configure per project — add paths and commands relevant to YOUR setup

blocked_commands:
  # Destructive file operations
  - "rm -rf /"
  - "rm -rf /*"
  - "rm -rf ~"
  - "rm -rf ."
  - "rm -rf .."
  - "rm -rf .git"
  - "> /dev/sda"
  - "mkfs"
  - ":(){ :|:& };:"

  # Destructive git operations
  # Note: "git push --force" intentionally does NOT match "--force-with-lease" (see regex)
  - "git push -f "
  - "git reset --hard"
  - "git clean -fd"
  - "git checkout -- ."

  # Dangerous system commands (use word-boundary regex below for these)
  # Moved: shutdown, reboot, pkill, killall, kill -9, chmod 777, chown -R, dd
  # to DESTRUCTIVE_REGEXES in bash-damage-control.py for word-boundary matching

ask_commands:
  # Deploy operations — require confirmation
  - "pm2 restart"
  - "npm run build"
  - "docker compose down"

  # Env/secret related — require confirmation
  - ".env"
  - "credentials"
  - "secret"
  - "token"
  - "api_key"

zero_access_paths:
  # Files that should NEVER be read or written by AI
  # Note: uses substring matching, so ".env" matches ".env.local" etc.
  # Exception: ".env.example" is explicitly allowed (see hooks)
  - ".env"
  - ".ssh"
  - "credentials.json"
  - "id_rsa"
  - "id_ed25519"

read_only_paths:
  # Files that should not be modified by AI
  - ".claude/hooks/"

no_delete_paths:
  # Files/dirs that should never be deleted or overwritten with empty content
  - ".claude/"
  - "CLAUDE.md"
